<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Cancellation Dashboard</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Simple fade-in animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SVG Icon Components (Replacing lucide-react for standalone HTML) ---
        const Ticket = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>);
        const Clock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
        const Calendar = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
        const DollarSign = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>);
        const CheckCircle2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
        const X = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);
        const ShieldAlert = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>);
        const Info = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>);

        // --- Main Application Logic ---
        const INITIAL_COMPONENTS = [
          {
            id: 'c1',
            name: 'Sunset Catamaran Cruise',
            type: 'Excursion',
            date: '2026-03-10', // Tomorrow (Late Cancel)
            cost: 150,
            state: 'Booked',
            outcome: null,
            daysUntil: 1
          },
          {
            id: 'c2',
            name: 'Helicopter Island Tour',
            type: 'Excursion',
            date: '2026-04-15', // Next Month (Early Cancel)
            cost: 400,
            state: 'Booked',
            outcome: null,
            daysUntil: 37
          },
          {
            id: 'c3',
            name: 'VIP Spa Access',
            type: 'Add-on',
            date: 'Flexible',
            cost: 200,
            state: 'Available', // Cannot be canceled
            outcome: null,
            daysUntil: null
          }
        ];

        function App() {
          const [components, setComponents] = useState(INITIAL_COMPONENTS);
          const [selectedComponent, setSelectedComponent] = useState(null);
          const [modalType, setModalType] = useState(null); // 'cancel' or 'optOut'
          const [toastMessage, setToastMessage] = useState(null);

          // Policy Engine Logic (Backstage)
          const calculateFinancialOutcome = (component) => {
            if (component.daysUntil !== null && component.daysUntil <= 14) {
              return 'Value Forfeited'; // Late cancellation policy
            }
            return 'Refunded'; // Standard policy
          };

          const handleOpenAction = (component, action) => {
            setSelectedComponent(component);
            setModalType(action);
          };

          const executeAction = () => {
            if (!selectedComponent) return;

            setComponents(prev => prev.map(c => {
              if (c.id === selectedComponent.id) {
                if (modalType === 'cancel') {
                  return {
                    ...c,
                    state: 'Canceled',
                    outcome: calculateFinancialOutcome(c)
                  };
                } else if (modalType === 'optOut') {
                  return {
                    ...c,
                    state: 'Opted Out',
                    outcome: 'N/A'
                  };
                }
              }
              return c;
            }));

            const outcomeStr = modalType === 'cancel' ? calculateFinancialOutcome(selectedComponent) : 'N/A';
            const stateStr = modalType === 'cancel' ? 'Canceled' : 'Opted Out';
            
            setToastMessage(`Success: Component marked as ${stateStr}. Financial Outcome: ${outcomeStr}`);
            setTimeout(() => setToastMessage(null), 5000);
            
            setSelectedComponent(null);
            setModalType(null);
          };

          const getBadgeColors = (state, outcome) => {
            const colors = {
              'Booked': 'bg-blue-100 text-blue-800 border-blue-200',
              'Available': 'bg-gray-100 text-gray-800 border-gray-200',
              'Canceled': 'bg-orange-100 text-orange-800 border-orange-200',
              'Opted Out': 'bg-gray-200 text-gray-600 border-gray-300',
              'Refunded': 'bg-green-100 text-green-800 border-green-200',
              'Value Forfeited': 'bg-red-100 text-red-800 border-red-200',
              'N/A': 'bg-gray-50 text-gray-400 border-gray-100'
            };
            return colors[state] || colors[outcome] || 'bg-gray-100 text-gray-800';
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
              {/* Top Navigation / Context Header */}
              <header className="bg-white border-b border-slate-200 px-6 py-4 shadow-sm flex justify-between items-center">
                <div>
                  <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <Ticket className="w-6 h-6 text-indigo-600" />
                    Agent Reservation Desk
                  </h1>
                  <p className="text-sm text-slate-500 mt-1">Guest: Jane Doe | Package: Hawaii Grand Explorer (Active)</p>
                </div>
                <div className="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full flex items-center gap-2">
                  <Clock className="w-4 h-4" /> System Date: 2026-03-09
                </div>
              </header>

              <main className="max-w-5xl mx-auto p-6">
                
                {/* Toast Notification */}
                {toastMessage && (
                  <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg flex items-start gap-3 shadow-sm animate-fade-in">
                    <CheckCircle2 className="w-5 h-5 text-green-600 mt-0.5 shrink-0" />
                    <p className="text-sm font-medium text-green-800">{toastMessage}</p>
                    <button onClick={() => setToastMessage(null)} className="ml-auto text-green-600 hover:text-green-800">
                      <X className="w-4 h-4" />
                    </button>
                  </div>
                )}

                <div className="mb-6">
                  <h2 className="text-lg font-semibold border-b pb-2 mb-4">Package Components</h2>
                  <p className="text-sm text-slate-600 mb-6">Manage individual items within the guest's active package.</p>
                  
                  <div className="grid gap-4">
                    {components.map((comp) => (
                      <div key={comp.id} className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col md:flex-row gap-6 items-start md:items-center hover:border-slate-300 transition-colors">
                        
                        {/* Component Info */}
                        <div className="flex-1">
                          <div className="flex items-center gap-3 mb-2">
                            <h3 className="font-semibold text-lg">{comp.name}</h3>
                            <span className="text-xs font-medium px-2 py-0.5 bg-indigo-50 text-indigo-700 rounded border border-indigo-100">
                              {comp.type}
                            </span>
                          </div>
                          <div className="flex flex-wrap items-center gap-4 text-sm text-slate-600">
                            <span className="flex items-center gap-1"><Calendar className="w-4 h-4" /> {comp.date}</span>
                            <span className="flex items-center gap-1"><DollarSign className="w-4 h-4" /> ${comp.cost}</span>
                          </div>
                        </div>

                        {/* Status & Outcome Flags (The Core Model) */}
                        <div className="flex flex-col gap-2 min-w-[200px] border-l md:border-l-2 border-slate-100 pl-0 md:pl-6">
                          <div>
                            <span className="text-xs text-slate-400 uppercase tracking-wider font-semibold block mb-1">Lifecycle State</span>
                            <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-sm font-medium border ${getBadgeColors(comp.state)}`}>
                              {comp.state}
                            </span>
                          </div>
                          {comp.state !== 'Available' && comp.state !== 'Booked' && (
                            <div>
                              <span className="text-xs text-slate-400 uppercase tracking-wider font-semibold block mb-1">Financial Outcome</span>
                              <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-sm font-medium border ${getBadgeColors(comp.outcome)}`}>
                                {comp.outcome}
                              </span>
                            </div>
                          )}
                        </div>

                        {/* Agent Actions */}
                        <div className="flex flex-col gap-2 min-w-[140px]">
                          {/* Cancel Button Logic */}
                          <div className="relative group">
                            <button 
                              onClick={() => handleOpenAction(comp, 'cancel')}
                              disabled={comp.state !== 'Booked'}
                              className={`w-full py-2 px-4 rounded-lg text-sm font-medium transition-colors ${
                                comp.state === 'Booked' 
                                  ? 'bg-white border border-red-200 text-red-600 hover:bg-red-50 hover:border-red-300' 
                                  : 'bg-gray-50 border border-gray-200 text-gray-400 cursor-not-allowed'
                              }`}
                            >
                              Cancel Item
                            </button>
                            {/* Tooltip for invalid state */}
                            {comp.state === 'Available' && (
                              <div className="absolute right-full top-1/2 -translate-y-1/2 mr-3 w-48 p-2 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-10 shadow-lg">
                                Cannot <strong>Cancel</strong> an unbooked item. Use <strong>Opt Out</strong> instead.
                                <div className="absolute right-[-4px] top-1/2 -translate-y-1/2 w-2 h-2 bg-slate-800 rotate-45"></div>
                              </div>
                            )}
                          </div>

                          {/* Opt Out Button Logic */}
                          {comp.state === 'Available' && (
                            <button 
                              onClick={() => handleOpenAction(comp, 'optOut')}
                              className="w-full py-2 px-4 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors"
                            >
                              Opt Out
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </main>

              {/* Action Modal (Policy Review Stage) */}
              {selectedComponent && modalType && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-xl shadow-xl max-w-md w-full overflow-hidden animate-fade-in-up">
                    <div className="p-6">
                      <div className="flex justify-between items-start mb-4">
                        <h3 className="text-xl font-bold text-slate-900">
                          {modalType === 'cancel' ? 'Review Cancellation' : 'Confirm Opt Out'}
                        </h3>
                        <button onClick={() => {setSelectedComponent(null); setModalType(null);}} className="text-slate-400 hover:text-slate-600">
                          <X className="w-5 h-5" />
                        </button>
                      </div>

                      <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
                        <p className="font-medium text-slate-800">{selectedComponent.name}</p>
                        <p className="text-sm text-slate-500 mt-1">Current State: <strong className="text-slate-700">{selectedComponent.state}</strong></p>
                      </div>

                      {/* Policy Engine Evaluation Display */}
                      {modalType === 'cancel' && (
                        <div className="mb-6 border-l-4 border-blue-500 pl-4">
                          <h4 className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2">
                            <ShieldAlert className="w-4 h-4 text-blue-500" /> Policy Engine Evaluation
                          </h4>
                          <p className="text-sm text-slate-600 mb-3">
                            Item is {selectedComponent.daysUntil} days away. Based on the 14-day cancellation policy, this action will result in:
                          </p>
                          
                          <div className={`p-3 rounded-md flex items-center justify-between border ${calculateFinancialOutcome(selectedComponent) === 'Refunded' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                            <span className="text-sm font-semibold text-slate-700">Financial Outcome:</span>
                            <span className={`text-sm font-bold ${calculateFinancialOutcome(selectedComponent) === 'Refunded' ? 'text-green-700' : 'text-red-700'}`}>
                              {calculateFinancialOutcome(selectedComponent)}
                            </span>
                          </div>
                          
                          {calculateFinancialOutcome(selectedComponent) === 'Value Forfeited' && (
                            <p className="text-xs text-slate-500 mt-2 flex items-start gap-1">
                              <Info className="w-3.5 h-3.5 mt-0.5 shrink-0" />
                              Late cancellation fee applies. The guest will lose the $ {selectedComponent.cost} paid value.
                            </p>
                          )}
                        </div>
                      )}

                      {modalType === 'optOut' && (
                        <p className="text-sm text-slate-600 mb-6">
                          You are removing this optional component from the guest's view. Because it was never "Booked", there is no financial outcome.
                        </p>
                      )}

                      <div className="flex gap-3 justify-end">
                        <button 
                          onClick={() => {setSelectedComponent(null); setModalType(null);}}
                          className="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50"
                        >
                          Go Back
                        </button>
                        <button 
                          onClick={executeAction}
                          className={`px-4 py-2 rounded-lg text-sm font-medium text-white shadow-sm focus:ring-2 focus:ring-offset-2 ${
                            modalType === 'cancel' 
                              ? 'bg-red-600 hover:bg-red-700 focus:ring-red-500' 
                              : 'bg-indigo-600 hover:bg-indigo-700 focus:ring-indigo-500'
                          }`}
                        >
                          {modalType === 'cancel' ? 'Confirm Cancellation' : 'Confirm Opt Out'}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
