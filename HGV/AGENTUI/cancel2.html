<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - Multi-Line Cancellation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade { animation: fadeIn 0.2s ease-out; }
        .animate-slide { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Icons
        const AlertCircle = () => <svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const PackageIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>;

        const INITIAL_DATA = [
            {
                id: 'comp_1',
                name: 'Alaskan Cruise Experience',
                vendor: 'Serefin Cruise Lines',
                date: '2026-03-11', // Very Close
                daysUntil: 2,
                lineItems: [
                    { id: 'li_1', name: 'Cruise Base Fare', cost: 1200.00, chargeTo: 'Package', state: 'Booked', outcome: null },
                    { id: 'li_2', name: 'Port Fees & Taxes', cost: 150.00, chargeTo: 'Package', state: 'Booked', outcome: null },
                    { id: 'li_3', name: 'Stateroom Upgrade: Balcony', cost: 300.00, chargeTo: 'Member', state: 'Booked', outcome: null }
                ]
            },
            {
                id: 'comp_2',
                name: 'Denali Wildlife Expedition',
                vendor: 'Wilderness Tours',
                date: '2026-06-15', // Far future
                daysUntil: 98,
                lineItems: [
                    { id: 'li_4', name: 'Standard Admission', cost: 125.00, chargeTo: 'Package', state: 'Booked', outcome: null },
                    { id: 'li_5', name: 'Box Lunch Add-on', cost: 25.00, chargeTo: 'Member', state: 'Booked', outcome: null }
                ]
            }
        ];

        function App() {
            const [data, setData] = useState(INITIAL_DATA);
            const [activeAction, setActiveAction] = useState(null); // { compId, lineItem }
            const [toast, setToast] = useState(null);

            const handleCancelClick = (compId, lineItem) => {
                setActiveAction({ compId, lineItem });
            };

            const confirmCancellation = () => {
                const { compId, lineItem } = activeAction;
                const parentComp = data.find(c => c.id === compId);
                
                // Policy Logic: 14 day threshold
                const isLate = parentComp.daysUntil <= 14;
                const outcome = isLate ? 'Value Forfeited' : 'Refunded';

                setData(prev => prev.map(comp => {
                    if (comp.id !== compId) return comp;
                    return {
                        ...comp,
                        lineItems: comp.lineItems.map(li => 
                            li.id === lineItem.id ? { ...li, state: 'Canceled', outcome } : li
                        )
                    };
                }));

                setToast({
                    title: "Cancellation Successful",
                    msg: `${lineItem.name} state changed to Canceled. Outcome: ${outcome}`
                });
                setTimeout(() => setToast(null), 5000);
                setActiveAction(null);
            };

            return (
                <div className="min-h-screen">
                    {/* Persistent Header */}
                    <header className="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white">
                                <PackageIcon />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-slate-800 leading-tight">Member Services Dashboard</h1>
                                <p className="text-slate-500 text-xs font-medium uppercase tracking-wider">Active Contract: #055-78921 | Guest: Marc Jacobs</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right">
                                <div className="text-xs text-slate-400 font-bold uppercase">System Reference Date</div>
                                <div className="text-sm font-mono font-bold text-slate-700">MARCH 09, 2026</div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-8 pb-24">
                        {/* Summary Section */}
                        <section className="mb-10 grid grid-cols-3 gap-6">
                           <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                               <p className="text-xs font-bold text-slate-400 uppercase mb-1">Package State</p>
                               <p className="text-lg font-bold text-indigo-600">Active</p>
                           </div>
                           <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                               <p className="text-xs font-bold text-slate-400 uppercase mb-1">Booked Components</p>
                               <p className="text-lg font-bold text-slate-800">{data.length}</p>
                           </div>
                           <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                               <p className="text-xs font-bold text-slate-400 uppercase mb-1">Upcoming Travel</p>
                               <p className="text-lg font-bold text-slate-800">2 Days (March 11)</p>
                           </div>
                        </section>

                        <div className="space-y-8">
                            <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <span className="w-1.5 h-6 bg-indigo-600 rounded-full"></span>
                                Component & Line Item Management
                            </h2>
                            {data.map(comp => (
                                <ComponentCard 
                                    key={comp.id} 
                                    comp={comp} 
                                    onCancelLineItem={(li) => handleCancelClick(comp.id, li)} 
                                />
                            ))}
                        </div>
                    </main>

                    {/* Notification Toast */}
                    {toast && (
                        <div className="fixed bottom-8 right-8 max-w-sm w-full bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-start gap-3 animate-slide z-50 border border-slate-700">
                            <div className="bg-green-500/20 p-1 rounded-full"><CheckCircle /></div>
                            <div>
                                <p className="text-sm font-bold">{toast.title}</p>
                                <p className="text-xs text-slate-400 mt-1">{toast.msg}</p>
                            </div>
                            <button onClick={()=>setToast(null)} className="ml-auto text-slate-500 hover:text-white"><XIcon/></button>
                        </div>
                    )}

                    {/* Policy Guidance Modal */}
                    {activeAction && (
                        <Modal 
                            action={activeAction} 
                            comp={data.find(c => c.id === activeAction.compId)}
                            onClose={() => setActiveAction(null)} 
                            onConfirm={confirmCancellation}
                        />
                    )}
                </div>
            );
        }

        function ComponentCard({ comp, onCancelLineItem }) {
            // Lifecycle Rollup Logic
            const totalItems = comp.lineItems.length;
            const canceledCount = comp.lineItems.filter(li => li.state === 'Canceled').length;
            
            let displayState = 'Booked';
            let stateClass = 'bg-blue-50 text-blue-700 border-blue-100';
            
            if (canceledCount === totalItems) {
                displayState = 'Canceled';
                stateClass = 'bg-orange-50 text-orange-700 border-orange-100';
            } else if (canceledCount > 0) {
                displayState = 'Booked (Partial)';
                stateClass = 'bg-indigo-50 text-indigo-700 border-indigo-100';
            }

            return (
                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden transition-all hover:shadow-md">
                    {/* Component Header */}
                    <div className="p-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-white rounded-2xl border border-slate-200 flex items-center justify-center font-bold text-slate-400 shadow-sm">
                                {totalItems - canceledCount}
                            </div>
                            <div>
                                <h3 className="text-lg font-extrabold text-slate-800">{comp.name}</h3>
                                <div className="flex items-center gap-3 mt-0.5">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-tighter">Travel Date: {comp.date}</span>
                                    <span className="text-xs text-slate-300">•</span>
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-tighter">{comp.vendor}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-1">
                            <span className="text-[10px] font-bold text-slate-400 uppercase">Rollup State</span>
                            <span className={`px-4 py-1 rounded-full text-xs font-extrabold uppercase tracking-widest border ${stateClass}`}>
                                {displayState}
                            </span>
                        </div>
                    </div>

                    {/* Line Items Table */}
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead className="bg-white">
                                <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em] border-b">
                                    <th className="px-8 py-4">Line Item Description</th>
                                    <th className="px-8 py-4">Charge Source</th>
                                    <th className="px-8 py-4">State</th>
                                    <th className="px-8 py-4">Financial Outcome</th>
                                    <th className="px-8 py-4">Price</th>
                                    <th className="px-8 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {comp.lineItems.map(li => (
                                    <tr key={li.id} className={`${li.state === 'Canceled' ? 'bg-slate-50/60' : 'hover:bg-slate-50/30'} transition-colors`}>
                                        <td className="px-8 py-5">
                                            <p className={`font-bold text-sm ${li.state === 'Canceled' ? 'text-slate-400 line-through' : 'text-slate-700'}`}>
                                                {li.name}
                                            </p>
                                        </td>
                                        <td className="px-8 py-5">
                                            <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md">{li.chargeTo}</span>
                                        </td>
                                        <td className="px-8 py-5">
                                            <span className={`text-[11px] font-extrabold uppercase tracking-tight ${
                                                li.state === 'Booked' ? 'text-blue-600' : 'text-slate-400'
                                            }`}>{li.state}</span>
                                        </td>
                                        <td className="px-8 py-5">
                                            {li.outcome ? (
                                                <div className="flex items-center gap-1.5">
                                                    <span className={`w-1.5 h-1.5 rounded-full ${li.outcome === 'Refunded' ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                                    <span className={`text-xs font-extrabold uppercase ${li.outcome === 'Refunded' ? 'text-green-600' : 'text-red-600'}`}>
                                                        {li.outcome}
                                                    </span>
                                                </div>
                                            ) : (
                                                <span className="text-[10px] text-slate-300 font-bold uppercase tracking-widest italic">—</span>
                                            )}
                                        </td>
                                        <td className="px-8 py-5 font-mono text-sm font-bold text-slate-600">${li.cost.toFixed(2)}</td>
                                        <td className="px-8 py-5 text-right">
                                            {li.state === 'Booked' ? (
                                                <button 
                                                    onClick={() => onCancelLineItem(li)}
                                                    className="bg-red-50 text-red-600 text-[10px] font-extrabold px-3 py-1.5 rounded-lg border border-red-100 hover:bg-red-600 hover:text-white transition-all uppercase tracking-wider"
                                                >
                                                    Cancel
                                                </button>
                                            ) : (
                                                <span className="text-[10px] text-slate-400 font-bold uppercase bg-slate-100 px-2 py-1 rounded">No Actions</span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function Modal({ action, comp, onClose, onConfirm }) {
            const isLate = comp.daysUntil <= 14;
            const outcome = isLate ? 'Value Forfeited' : 'Refund Eligible';
            
            return (
                <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-[2rem] shadow-2xl max-w-lg w-full overflow-hidden animate-slide">
                        <div className="p-10">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="bg-red-100 p-2 rounded-xl text-red-600">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800">Review Line Item Action</h2>
                            </div>

                            <p className="text-slate-500 text-sm leading-relaxed mb-8">
                                You are requesting to <strong>Cancel</strong> a specific line item within the <span className="text-slate-800 font-bold underline decoration-indigo-300">{comp.name}</span>.
                            </p>
                            
                            <div className="space-y-4 mb-8">
                                <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Target Scope</p>
                                        <p className="font-extrabold text-slate-700">{action.lineItem.name}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Value</p>
                                        <p className="font-mono font-black text-slate-800">${action.lineItem.cost.toFixed(2)}</p>
                                    </div>
                                </div>

                                <div className={`p-6 rounded-2xl border-2 flex gap-4 ${isLate ? 'bg-red-50/50 border-red-100' : 'bg-green-50/50 border-green-100'}`}>
                                    <div className="mt-1">{isLate ? <AlertCircle /> : <CheckCircle />}</div>
                                    <div>
                                        <h4 className={`text-xs font-black uppercase tracking-widest ${isLate ? 'text-red-700' : 'text-green-700'}`}>
                                            Financial Outcome: {outcome}
                                        </h4>
                                        <p className="text-xs text-slate-600 mt-1.5 font-medium leading-normal">
                                            {isLate 
                                                ? `Travel is in ${comp.daysUntil} days (within 14-day window). Automatic forfeiture of line item value is required by policy.`
                                                : `Travel is in ${comp.daysUntil} days (outside penalty window). This amount will be credited back to the member.`}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <button onClick={onClose} className="flex-1 py-4 px-6 rounded-2xl border border-slate-200 font-extrabold text-slate-600 hover:bg-slate-50 transition-all text-sm uppercase tracking-wider">Keep Item</button>
                                <button onClick={onConfirm} className="flex-1 py-4 px-6 rounded-2xl bg-slate-900 text-white font-extrabold hover:bg-black shadow-xl shadow-slate-200 transition-all text-sm uppercase tracking-wider">Confirm Action</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const XIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
