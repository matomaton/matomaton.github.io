<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name – Product Designer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ----  Reset / base ---- */
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #222;
      background: #fafafa;
    }

    /* ---- Centered container ---- */
    .wrapper{
      max-width: 680px;          /* keeps line length readable */
      margin: 0 auto;
      padding: 4rem 1.25rem;     /* generous top/bottom, fluid sides */
    }

    /* ---- Typography ---- */
    h1{
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }
    h2{
      font-size: 1.5rem;
      margin: 2.5rem 0 1rem;
      font-weight: 600;
    }
    p{
      margin-bottom: 1rem;
    }
    ul, ol{
      margin: 0 0 1.5rem 1.25rem;
    }

    /* ---- Tiny polish ---- */
    a{color:#0052cc;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>

<body>
  <main class="wrapper">
    <h1>Case Study Title</h1>

    <h2>Problem</h2>
    <p>Short paragraph describing the problem you tackled.</p>

    <h2>Process</h2>
    <ul>
      <li>User interviews</li>
      <li>Affinity mapping</li>
      <li>Rapid prototyping</li>
    </ul>

    <h2>Outcome</h2>
    <p>What changed for users and the business. Add metrics if you have them.</p>
  </main>
</body>
</html>
