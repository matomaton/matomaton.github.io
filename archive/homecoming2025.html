<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .thumbnail-container {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .thumbnail-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .thumbnail {
            display: block;
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            transition: opacity 0.3s ease;
        }

        .thumbnail:hover {
            opacity: 0.9;
        }

        .photo-title {
            text-align: center;
            margin-top: 10px;
            color: #555;
            font-size: 14px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            
            .thumbnail {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h1>Photo Gallery</h1>
        
        <div class="gallery">
            <!-- Sample photo thumbnails - replace with your own images -->
            <div class="thumbnail-container">
                <a href="https://picsum.photos/800/600?random=1" target="_blank">
                    <img src="https://picsum.photos/250/200?random=1" alt="Nature Scene" class="thumbnail">
                </a>
                <div class="photo-title">Beautiful Landscape</div>
            </div>

            <div class="thumbnail-container">
                <a href="https://picsum.photos/800/600?random=2" target="_blank">
                    <img src="https://picsum.photos/250/200?random=2" alt="City View" class="thumbnail">
                </a>
                <div class="photo-title">Urban Architecture</div>
            </div>

            <div class="thumbnail-container">
                <a href="https://picsum.photos/800/600?random=3" target="_blank">
                    <img src="https://picsum.photos/250/200?random=3" alt="Ocean Waves" class="thumbnail">
                </a>
                <div class="photo-title">Coastal Beauty</div>
            </div>

            <div class="thumbnail-container">
                <a href="https://picsum.photos/800/600?random=4" target="_blank">
                    <img src="https://picsum.photos/250/200?random=4" alt="Mountain Peak" class="thumbnail">
                </a>
                <div class="photo-title">Mountain Vista</div>
            </div>

            <div class="thumbnail-container">
                <a href="https://picsum.photos/800/600?random=5" target="_blank">
                    <img src="https://picsum.photos/250/200?random=5" alt="Forest Path" class="thumbnail">
                </a>
                <div class="photo-title">Forest Trail</div>
            </div>

            <div class="thumbnail-container">
                <a href="https://picsum.photos/800/600?random=6" target="_blank">
                    <img src="https://picsum.photos/250/200?random=6" alt="Desert Sunset" class="thumbnail">
                </a>
                <div class="photo-title">Desert Sunset</div>
            </div>
        </div>
    </div>
</body>
</html>
