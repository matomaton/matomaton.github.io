<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGV Points Scenario Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 20px; height: 20px; background: #2563eb;
            border-radius: 50%; cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .spent-overlay {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- NEW DATA FOR "HOW POINTS WORK" TAB ---
        const POINTS_OVERVIEW = [
            { 
                title: 'ClubPoints', 
                icon: 'wallet',
                color: 'bg-blue-600',
                content: 'The symbolic currency of your vacation ownership. Allocated annually based on location, season, and accommodation. They enable access to Club privileges and expire at the end of each calendar year if unused.'
            },
            { 
                title: 'Saved Points', 
                icon: 'piggy-bank',
                color: 'bg-purple-600',
                content: 'ClubPoints that have been "saved" for an additional year. Use them for Home Resort and Club Reservations, by Hilton Club Priority, RCI exchanges, and Travel Services/ClubPartner Perks.'
            },
            { 
                title: 'Bonus Points', 
                icon: 'sparkles',
                color: 'bg-emerald-500',
                content: 'An extra currency awarded with purchases or affiliations. Valid for up to 2 years. Highly flexible: use for hotel reservations, RCI, gift certificates, maintenance fees, or convert to Honors Points.'
            },
            { 
                title: 'Hilton Honors', 
                icon: 'building-2',
                color: 'bg-slate-800',
                content: 'The currency of the award-winning Hilton Honors program. You can convert Bonus Points (or combine them with ClubPoints) to earn and redeem stays throughout the global Hilton Worldwide Portfolio.'
            }
        ];

        const USE_MATRIX = [
            { reservation: 'Home Week', current: true, borrowed: false, saved: false, bonus: false, honors: false },
            { reservation: 'Home Resort', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'Club', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'HGV Max', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'Priority (by Hilton Club)', current: true, borrowed: true, saved: true, bonus: false, honors: false },
            { reservation: 'Travel Services & Perks', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'RCI Exchange', current: true, borrowed: true, saved: true, bonus: true, honors: false },
        ];

        const ALLOTMENTS = [
            { type: 'Bonus Points', points: '50,000', received: '01/01/2025', expires: '12/31/2027' },
            { type: 'ClubPoints - 2026', points: '100,000', received: '01/01/2026', expires: '12/31/2026' },
            { type: 'Saved ClubPoints - 2026', points: '88,958', received: '01/01/2026', expires: '12/31/2026' },
            { type: 'ClubPoints - 2027', points: '100,000', received: '01/01/2027', expires: '12/31/2027' },
            { type: 'Saved ClubPoints - 2027', points: '0', received: '01/01/2027', expires: '12/31/2027' },
            { type: 'ClubPoints - 2028', points: '100,000', received: '01/01/2028', expires: '12/31/2028' },
            { type: 'Saved ClubPoints - 2028', points: '0', received: '01/01/2028', expires: '12/31/2028' },
        ];
        // --- END NEW DATA ---

        const SCENARIOS = [
            { id: 1, title: 'Waikiki 7-Night Escape', type: 'Resort', location: 'Grand Islander', cost: 11200, img: 'https://images.unsplash.com/photo-1542259009477-d625272157b7?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: 2, title: 'Las Vegas Long Weekend', type: 'Urban', location: 'Elara', cost: 6400, img: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: 3, title: 'Ultimate Caribbean Cruise', type: 'Experience', location: 'Partner Cruise', cost: 22000, img: 'https://images.unsplash.com/photo-1599640842225-85d111c60e6b?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: 4, title: 'Orlando Theme Park Week', type: 'Resort', location: 'Tuscany Village', cost: 8500, img: 'https://images.unsplash.com/photo-1575089776834-8be34696ffb9?auto=format&fit=crop&q=80&w=400&h=250' }
        ];

        function App() {
            // Tab State
            const [activeTab, setActiveTab] = useState('calculator');

            // Calculator State
            const [baseAllotment, setBaseAllotment] = useState(11200);
            const [savedPoints, setSavedPoints] = useState(4500);
            const [bonusPoints, setBonusPoints] = useState(2500);
            const [borrowedPoints, setBorrowedPoints] = useState(0);
            const [activeScenarioIdx, setActiveScenarioIdx] = useState(0);

            const activeScenario = SCENARIOS[activeScenarioIdx];
            const totalAvailableNow = baseAllotment + savedPoints + bonusPoints + borrowedPoints;

            // Usage logic based on strict HGV rules (Bonus/Saved used first, then Current, then Borrowed)
            let remainingCost = activeScenario.cost;
            
            const usedBonus = Math.min(bonusPoints, remainingCost);
            remainingCost -= usedBonus;
            
            const usedSaved = Math.min(savedPoints, remainingCost);
            remainingCost -= usedSaved;
            
            const usedCurrent = Math.min(baseAllotment, remainingCost);
            remainingCost -= usedCurrent;
            
            const usedBorrowed = Math.min(borrowedPoints, remainingCost);
            remainingCost -= usedBorrowed;

            const isShort = remainingCost > 0;
            const pointsNeeded = remainingCost;

            const renderCell = (value) => {
                return value ? 
                    <Icon name="check-circle-2" className="w-5 h-5 text-emerald-500 mx-auto" /> : 
                    <Icon name="minus" className="w-5 h-5 text-slate-300 mx-auto" />;
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-6 shadow-xl shrink-0 flex justify-between items-center z-10 relative">
                        <div>
                            <h1 className="text-2xl font-black tracking-tight flex items-center gap-3">
                                <Icon name="calculator" className="text-blue-400" />
                                HGV Points Scenario Planner
                            </h1>
                            <p className="text-slate-400 text-sm mt-1 font-medium">Maximize your ownership value across multiple years</p>
                        </div>
                        
                        {/* Tab Navigation */}
                        <div className="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                            <button 
                                onClick={() => setActiveTab('calculator')}
                                className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'calculator' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}
                            >
                                <div className="flex items-center gap-2"><Icon name="calculator" className="w-4 h-4" /> Scenario Planner</div>
                            </button>
                            <button 
                                onClick={() => setActiveTab('education')}
                                className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'education' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}
                            >
                                <div className="flex items-center gap-2"><Icon name="book-open" className="w-4 h-4" /> How Points Work</div>
                            </button>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-hidden flex relative">
                        
                        {/* TAB 1: CALCULATOR / SCENARIO PLANNER (Original Code) */}
                        {activeTab === 'calculator' && (
                            <div className="flex w-full h-full fade-in">
                                {/* Left Panel: Points Inputs */}
                                <div className="w-1/3 bg-white border-r border-slate-200 shadow-lg flex flex-col z-10 overflow-y-auto custom-scrollbar">
                                    <div className="p-8">
                                        <h2 className="text-sm font-black text-slate-400 tracking-widest uppercase mb-6 flex items-center gap-2">
                                            <Icon name="wallet" className="w-4 h-4" /> Your Points Portfolio
                                        </h2>
                                        
                                        {/* Total Summary */}
                                        <div className="bg-slate-900 text-white rounded-2xl p-6 mb-8 shadow-xl">
                                            <p className="text-slate-400 text-sm font-medium mb-1">Total Available Points</p>
                                            <p className="text-4xl font-black tracking-tighter text-blue-400">{totalAvailableNow.toLocaleString()}</p>
                                        </div>

                                        <div className="space-y-8">
                                            {/* Base Allotment */}
                                            <div>
                                                <div className="flex justify-between items-end mb-2">
                                                    <div>
                                                        <p className="font-bold text-slate-800">Current Year ClubPoints</p>
                                                        <p className="text-xs text-slate-500 font-medium">Expires Dec 31</p>
                                                    </div>
                                                    <span className="font-black text-blue-600 text-lg">{baseAllotment.toLocaleString()}</span>
                                                </div>
                                                <input type="range" min="0" max="24000" step="100" value={baseAllotment} onChange={(e) => setBaseAllotment(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>

                                            {/* Saved Points */}
                                            <div>
                                                <div className="flex justify-between items-end mb-2">
                                                    <div>
                                                        <p className="font-bold text-slate-800 text-purple-600">Saved Points</p>
                                                        <p className="text-xs text-slate-500 font-medium">Carried over from last year</p>
                                                    </div>
                                                    <span className="font-black text-purple-600 text-lg">{savedPoints.toLocaleString()}</span>
                                                </div>
                                                <input type="range" min="0" max="15000" step="100" value={savedPoints} onChange={(e) => setSavedPoints(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>

                                            {/* Bonus Points */}
                                            <div>
                                                <div className="flex justify-between items-end mb-2">
                                                    <div>
                                                        <p className="font-bold text-slate-800 text-emerald-500">Bonus Points</p>
                                                        <p className="text-xs text-slate-500 font-medium">Promotional / Purchase bonus</p>
                                                    </div>
                                                    <span className="font-black text-emerald-500 text-lg">{bonusPoints.toLocaleString()}</span>
                                                </div>
                                                <input type="range" min="0" max="20000" step="100" value={bonusPoints} onChange={(e) => setBonusPoints(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>

                                            <hr className="border-slate-100" />

                                            {/* Borrowed Points */}
                                            <div className="bg-amber-50 rounded-xl p-4 border border-amber-200">
                                                <div className="flex justify-between items-end mb-2">
                                                    <div>
                                                        <p className="font-bold text-amber-600 flex items-center gap-1"><Icon name="fast-forward" className="w-4 h-4" /> Borrow Next Year</p>
                                                        <p className="text-[10px] text-amber-500 font-bold uppercase tracking-wider mt-1">Advances future points</p>
                                                    </div>
                                                    <span className="font-black text-amber-600 text-lg">{borrowedPoints.toLocaleString()}</span>
                                                </div>
                                                <input type="range" min="0" max="24000" step="100" value={borrowedPoints} onChange={(e) => setBorrowedPoints(Number(e.target.value))} className="w-full h-2 bg-amber-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Panel: Scenarios & Visualization */}
                                <div className="w-2/3 bg-slate-50 p-8 overflow-y-auto custom-scrollbar flex flex-col">
                                    <h2 className="text-sm font-black text-slate-400 tracking-widest uppercase mb-6 flex items-center gap-2">
                                        <Icon name="map" className="w-4 h-4" /> Select a Scenario
                                    </h2>

                                    {/* Scenario Selector */}
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                        {SCENARIOS.map((scenario, idx) => (
                                            <div 
                                                key={scenario.id} 
                                                onClick={() => setActiveScenarioIdx(idx)}
                                                className={`relative rounded-xl overflow-hidden cursor-pointer transition-all border-2 ${activeScenarioIdx === idx ? 'border-blue-600 shadow-lg scale-105 z-10' : 'border-transparent shadow hover:shadow-md'}`}
                                            >
                                                <div className="h-24 relative">
                                                    <div className="absolute inset-0 bg-slate-900/30"></div>
                                                    <img src={scenario.img} className="w-full h-full object-cover" alt="" />
                                                    <div className="absolute inset-0 p-3 flex flex-col justify-end">
                                                        <p className="text-white text-xs font-bold leading-tight">{scenario.title}</p>
                                                    </div>
                                                </div>
                                                <div className="bg-white p-2 text-center">
                                                    <p className="text-xs font-black text-slate-800">{scenario.cost.toLocaleString()} pts</p>
                                                </div>
                                                {activeScenarioIdx === idx && (
                                                    <div className="absolute top-2 right-2 bg-blue-600 text-white rounded-full p-1 shadow">
                                                        <Icon name="check" className="w-3 h-3" />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    {/* Visualizer Engine */}
                                    <div className="bg-slate-900 rounded-3xl p-8 text-white shadow-2xl relative overflow-hidden flex-1 flex flex-col">
                                        {/* Background Decor */}
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-overlay opacity-10 blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                                        
                                        <div className="relative z-10 flex-1">
                                            <div className="flex justify-between items-start mb-8">
                                                <div>
                                                    <span className="bg-blue-600/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-full border border-blue-500/30 uppercase tracking-wider">{activeScenario.type}</span>
                                                    <h3 className="text-3xl font-black mt-3 mb-1">{activeScenario.title}</h3>
                                                    <p className="text-slate-400 flex items-center gap-2"><Icon name="map-pin" className="w-4 h-4" /> {activeScenario.location}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">Trip Cost</p>
                                                    <p className="text-4xl font-black text-white">{activeScenario.cost.toLocaleString()}</p>
                                                </div>
                                            </div>

                                            {/* Stacked Bar Chart Visualization */}
                                            <div className="bg-slate-800/50 border border-white/10 p-6 rounded-2xl mb-8">
                                                <h4 className="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2">
                                                    <Icon name="layers" className="w-4 h-4" /> How Points Will Be Applied
                                                </h4>
                                                
                                                {/* Progress Bar Container */}
                                                <div className="h-8 flex rounded-lg overflow-hidden mb-6 bg-slate-800">
                                                    {usedBonus > 0 && <div style={{width: `${(usedBonus/activeScenario.cost)*100}%`}} className="bg-emerald-500 h-full flex items-center justify-center text-[10px] font-bold spent-overlay border-r border-emerald-600/30 transition-all duration-500">Bonus</div>}
                                                    {usedSaved > 0 && <div style={{width: `${(usedSaved/activeScenario.cost)*100}%`}} className="bg-purple-500 h-full flex items-center justify-center text-[10px] font-bold spent-overlay border-r border-purple-600/30 transition-all duration-500">Saved</div>}
                                                    {usedCurrent > 0 && <div style={{width: `${(usedCurrent/activeScenario.cost)*100}%`}} className="bg-blue-500 h-full flex items-center justify-center text-[10px] font-bold spent-overlay border-r border-blue-600/30 transition-all duration-500">Current</div>}
                                                    {usedBorrowed > 0 && <div style={{width: `${(usedBorrowed/activeScenario.cost)*100}%`}} className="bg-amber-500 h-full flex items-center justify-center text-[10px] font-bold spent-overlay border-r border-amber-600/30 transition-all duration-500">Borrowed</div>}
                                                    {isShort && <div style={{width: `${(pointsNeeded/activeScenario.cost)*100}%`}} className="bg-red-500/20 h-full flex items-center justify-center text-[10px] font-bold text-red-300 transition-all duration-500">Short</div>}
                                                </div>

                                                {/* Legend / Breakdown */}
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                    <div className={`p-3 rounded-lg border ${usedBonus > 0 ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-slate-800/30 border-white/5 opacity-50'}`}>
                                                        <p className="text-[10px] uppercase font-bold text-emerald-400 mb-1">Bonus Used</p>
                                                        <p className="text-lg font-black">{usedBonus.toLocaleString()}</p>
                                                    </div>
                                                    <div className={`p-3 rounded-lg border ${usedSaved > 0 ? 'bg-purple-500/10 border-purple-500/30' : 'bg-slate-800/30 border-white/5 opacity-50'}`}>
                                                        <p className="text-[10px] uppercase font-bold text-purple-400 mb-1">Saved Used</p>
                                                        <p className="text-lg font-black">{usedSaved.toLocaleString()}</p>
                                                    </div>
                                                    <div className={`p-3 rounded-lg border ${usedCurrent > 0 ? 'bg-blue-500/10 border-blue-500/30' : 'bg-slate-800/30 border-white/5 opacity-50'}`}>
                                                        <p className="text-[10px] uppercase font-bold text-blue-400 mb-1">Current Used</p>
                                                        <p className="text-lg font-black">{usedCurrent.toLocaleString()}</p>
                                                    </div>
                                                    <div className={`p-3 rounded-lg border ${usedBorrowed > 0 ? 'bg-amber-500/10 border-amber-500/30' : 'bg-slate-800/30 border-white/5 opacity-50'}`}>
                                                        <p className="text-[10px] uppercase font-bold text-amber-400 mb-1">Borrowed Used</p>
                                                        <p className="text-lg font-black">{usedBorrowed.toLocaleString()}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Results / Warning */}
                                            {isShort ? (
                                                <div className="bg-red-500/10 border border-red-500/30 p-4 rounded-xl flex items-start gap-4">
                                                    <div className="bg-red-500/20 p-2 rounded-full text-red-400 shrink-0"><Icon name="alert-triangle" className="w-5 h-5" /></div>
                                                    <div>
                                                        <h4 className="text-red-400 font-bold mb-1">Insufficient Points</h4>
                                                        <p className="text-sm text-red-300/80">You need <span className="font-black text-white">{pointsNeeded.toLocaleString()} more points</span> for this specific plan.</p>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="bg-emerald-500/10 border border-emerald-500/30 p-4 rounded-xl flex items-start gap-4">
                                                    <div className="bg-emerald-500/20 p-2 rounded-full text-emerald-400 shrink-0"><Icon name="check-circle" className="w-5 h-5" /></div>
                                                    <div>
                                                        <h4 className="text-emerald-400 font-bold mb-1">Trip Fully Covered!</h4>
                                                        <p className="text-sm text-emerald-300/80">You have enough points. Click 'Create Trip' to proceed.</p>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            <div className="pt-6 mt-6 border-t border-white/10 flex justify-between items-center">
                                                <div>
                                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Points Remaining After Stay</p>
                                                    <p className="text-xl font-black text-emerald-400">{Math.max(0, totalAvailableNow - activeScenario.cost).toLocaleString()}</p>
                                                </div>
                                                <button className={`px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-lg ${isShort ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-600/20'}`}>
                                                    {isShort ? 'Need Points' : 'Create Trip'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: EDUCATION HUB (From attached document) */}
                        {activeTab === 'education' && (
                            <div className="flex-1 w-full h-full overflow-y-auto custom-scrollbar fade-in bg-slate-100">
                                <div className="max-w-6xl mx-auto px-8 py-12 space-y-12">
                                    
                                    {/* Intro Section */}
                                    <div className="text-center max-w-2xl mx-auto">
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">How Points Work</h2>
                                        <p className="text-slate-600 mt-3 text-lg">Hilton Grand Vacations Club is a flexible, point-based reservation system. Understanding your point types unlocks the full value of your ownership.</p>
                                    </div>

                                    {/* 1. Point Types Grid */}
                                    <div>
                                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                            <Icon name="layers" className="text-blue-600" /> Points Overview
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {POINTS_OVERVIEW.map((card, idx) => (
                                                <div key={idx} className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col h-full">
                                                    <div className={`w-12 h-12 rounded-xl ${card.color} text-white flex items-center justify-center mb-4 shadow-sm`}>
                                                        <Icon name={card.icon} className="w-6 h-6" />
                                                    </div>
                                                    <h4 className="text-lg font-bold text-slate-800 mb-2">{card.title}</h4>
                                                    <p className="text-slate-600 text-sm leading-relaxed flex-1">
                                                        {card.content}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 2. Ways to Use Points Matrix */}
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="p-6 border-b border-slate-200 bg-slate-50">
                                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                                <Icon name="map-pin" className="text-blue-600" /> Ways to Use Points
                                            </h3>
                                            <p className="text-sm text-slate-500 mt-1">See exactly where your different currencies can take you.</p>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead className="bg-white">
                                                    <tr>
                                                        <th className="p-4 font-bold text-slate-800 border-b border-r border-slate-200">Reservation Type</th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center">Current Year<br/><span className="text-xs font-normal text-slate-400">ClubPoints</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center">Borrowed<br/><span className="text-xs font-normal text-slate-400">From Next Year</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center bg-purple-50">Saved<br/><span className="text-xs font-normal text-slate-400">Points</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center bg-emerald-50">Bonus<br/><span className="text-xs font-normal text-slate-400">Points</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center bg-slate-100">Hilton Honors<br/><span className="text-xs font-normal text-slate-400">Points</span></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {USE_MATRIX.map((row, idx) => (
                                                        <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 font-medium text-slate-700 border-r border-slate-200">{row.reservation}</td>
                                                            <td className="p-4 text-center">{renderCell(row.current)}</td>
                                                            <td className="p-4 text-center">{renderCell(row.borrowed)}</td>
                                                            <td className="p-4 text-center bg-purple-50/50">{renderCell(row.saved)}</td>
                                                            <td className="p-4 text-center bg-emerald-50/50">{renderCell(row.bonus)}</td>
                                                            <td className="p-4 text-center bg-slate-50">{renderCell(row.honors)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* 3. My Current Points Dashboard (Based on user document) */}
                                    <div className="mb-12">
                                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                            <Icon name="pie-chart" className="text-blue-600" /> Manage My Points
                                        </h3>
                                        
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            {/* Summary Card */}
                                            <div className="lg:col-span-1 bg-slate-900 rounded-2xl p-8 text-white shadow-lg relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full mix-blend-overlay opacity-20 transform translate-x-8 -translate-y-8 blur-2xl"></div>
                                                <h4 className="text-slate-400 font-semibold mb-1 uppercase tracking-wider text-sm">2026 Club Currency</h4>
                                                <div className="text-5xl font-black mb-6 text-white">188,958</div>
                                                
                                                <div className="space-y-3">
                                                    <div className="flex justify-between items-center text-sm border-b border-white/10 pb-2">
                                                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-400"></div> Bonus Points</span>
                                                        <span className="font-bold">50,000</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-sm border-b border-white/10 pb-2">
                                                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-400"></div> Points - 2026</span>
                                                        <span className="font-bold">100,000</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-purple-400"></div> Saved Points - 2026</span>
                                                        <span className="font-bold">88,958</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Detailed Allotment List */}
                                            <div className="lg:col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                                    <h4 className="font-bold text-slate-800">Annual Allotment Timeline</h4>
                                                    <span className="text-xs font-bold bg-blue-50 text-blue-600 px-3 py-1 rounded-full border border-blue-100">Official Data</span>
                                                </div>
                                                <div className="flex-1 overflow-x-auto p-0">
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider">
                                                            <tr>
                                                                <th className="p-4 font-semibold">Type</th>
                                                                <th className="p-4 font-semibold text-right">Points</th>
                                                                <th className="p-4 font-semibold">Date Received</th>
                                                                <th className="p-4 font-semibold">Date Expiring</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {ALLOTMENTS.map((item, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50">
                                                                    <td className="p-4 font-medium text-slate-700">{item.type}</td>
                                                                    <td className="p-4 font-bold text-slate-800 text-right">{item.points}</td>
                                                                    <td className="p-4 text-slate-500">{item.received}</td>
                                                                    <td className="p-4 text-slate-500 flex items-center gap-2">
                                                                        {item.expires}
                                                                        {item.points !== '0' && <Icon name="clock" className="w-3 h-3 text-slate-300" />}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
