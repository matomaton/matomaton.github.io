<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGV Points Scenario Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 20px; height: 20px; background: #2563eb;
            border-radius: 50%; cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .spent-overlay {
            background-image: repeating-linear-gradient(45deg,rgba(0,0,0,0.2),rgba(0,0,0,0.2) 10px,transparent 10px,transparent 20px);
            background-size: 28px 28px;
        }
        .gap-stripe {
            background-image: repeating-linear-gradient(45deg,rgba(255,255,255,0.15),rgba(255,255,255,0.15) 8px,transparent 8px,transparent 16px);
            background-size: 22px 22px;
        }
        .bar-container { display: flex; gap: 0; }
        .bar-segment-wrapper { flex-shrink:0; flex-grow:0; position:relative; height:100%; min-width:0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const INITIAL_BALANCES = { rollover:2500, current:7000, bonus:1500, nextYearAllocation:7000 };
        const MULTIPLIERS = {
            season: { 'Off-peak':0.7, 'Standard':1.0, 'Peak':1.4 },
            roomType: { 'Studio':800, '1BR':1200, '2BR':1900, '3BR':2600 }
        };
        const Icon = ({ name, className="w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };
        const Tooltip = ({ children, text, style }) => (
            <div className="group bar-segment-wrapper" style={style}>
                {children}
                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-48 p-2 bg-slate-900 text-white text-[10px] rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 text-center pointer-events-none">
                    {text}
                    <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                </div>
            </div>
        );

        function App() {
            const [balances] = useState(INITIAL_BALANCES);
            const [nights, setNights] = useState(5);
            const [roomType, setRoomType] = useState('1BR');
            const [season, setSeason] = useState('Standard');
            const [selectedScenarioId, setSelectedScenarioId] = useState('custom');

            const totalAvailableNow = balances.rollover + balances.current + balances.bonus;
            const grandTotalPoints = totalAvailableNow + balances.nextYearAllocation;

            const scenarios = useMemo(() => {
                const customCost = Math.round(MULTIPLIERS.roomType[roomType] * MULTIPLIERS.season[season] * nights);
                return [
                    { id:'custom', title:'Your Current Plan', desc:`${nights} nights in a ${roomType}`, cost:customCost, icon:'calendar' },
                    { id:'max', title:'Maximize My Nights', desc:'14 nights in a Studio (Off-peak)', cost:7840, icon:'map' },
                    { id:'dream', title:'The Dream Upgrade', desc:'7 nights in a 3BR (Peak)', cost:25480, icon:'sparkles' },
                    { id:'weekend', title:'Quick Weekend', desc:'3 nights in a 1BR (Standard)', cost:3600, icon:'clock' }
                ];
            }, [nights, roomType, season]);

            const activeScenario = scenarios.find(s => s.id === selectedScenarioId) || scenarios[0];

            const impact = useMemo(() => {
                let remaining = activeScenario.cost;
                const used = { rollover:0, current:0, bonus:0, borrowed:0 };
                used.rollover = Math.min(remaining, balances.rollover); remaining -= used.rollover;
                used.current = Math.min(remaining, balances.current); remaining -= used.current;
                used.bonus = Math.min(remaining, balances.bonus); remaining -= used.bonus;
                used.borrowed = Math.min(remaining, balances.nextYearAllocation); remaining -= used.borrowed;
                return { used, gap: remaining };
            }, [activeScenario.cost, balances]);

            // When a gap exists, expand barTotal so the gap gets at least 10% of visible bar width.
            // This proportionally shrinks the point segments to make room — no clipping.
            const MIN_GAP_PCT = 10;
            const barTotal = impact.gap > 0
                ? Math.max(grandTotalPoints + impact.gap, grandTotalPoints / (1 - MIN_GAP_PCT / 100))
                : grandTotalPoints;

            const PointSegment = ({ amount, used, colorClass, label }) => {
                const widthPct = (amount / barTotal) * 100;
                const usedPct = amount > 0 ? (used / amount) * 100 : 0;
                const showLabel = usedPct > 30 && used >= 500;
                return (
                    <Tooltip style={{ flexBasis:`${widthPct}%` }} text={`${label}: ${amount.toLocaleString()} pts (${used.toLocaleString()} used)`}>
                        <div className={`absolute inset-0 ${colorClass}`} />
                        {used > 0 && (
                            <div className="absolute inset-y-0 left-0 spent-overlay bg-black/10 transition-all duration-500 ease-out flex items-center justify-center overflow-hidden" style={{ width:`${usedPct}%` }}>
                                {showLabel && <span className="text-[10px] font-black text-white/80 whitespace-nowrap px-1">-{used.toLocaleString()}</span>}
                            </div>
                        )}
                    </Tooltip>
                );
            };

            const GapSegment = ({ gap }) => {
                const widthPct = (gap / barTotal) * 100;
                return (
                    <div className="bar-segment-wrapper flex items-center justify-center bg-red-500 gap-stripe transition-all duration-500 ease-out"
                        style={{ flexBasis:`${widthPct}%`, flexGrow:1 }}>
                        <div className="flex flex-col items-center leading-tight">
                            <span className="text-white font-black text-xs whitespace-nowrap">⚠ GAP</span>
                            <span className="text-white/90 font-black text-[10px] whitespace-nowrap">-{gap.toLocaleString()} pts</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 px-6 py-4">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200"><Icon name="ship" /></div>
                                <h1 className="text-xl font-black tracking-tight text-slate-800">HGV <span className="font-light text-slate-400">POINTS PRO</span></h1>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-center md:text-right">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Available This Year</p>
                                    <p className="text-xl font-black text-slate-800">{totalAvailableNow.toLocaleString()}</p>
                                </div>
                                <div className="h-10 w-px bg-slate-200 hidden md:block" />
                                <div className="text-center md:text-right">
                                    <p className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Trip Total</p>
                                    <p className="text-xl font-black text-blue-600">{activeScenario.cost.toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                        <section className="bg-white rounded-[2rem] shadow-xl shadow-slate-200/60 border border-slate-100 p-6 md:p-10">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                                <div>
                                    <h2 className="text-2xl font-black text-slate-800">Point Depletion Strategy</h2>
                                    <p className="text-slate-500 text-sm">Visualizing how your {activeScenario.cost.toLocaleString()} point trip allocates across accounts.</p>
                                </div>
                                <div className="px-4 py-2 bg-amber-50 rounded-full border border-amber-100 flex items-center gap-2">
                                    <Icon name="alert-triangle" className="w-4 h-4 text-amber-500" />
                                    <span className="text-xs font-bold text-amber-700">{balances.rollover.toLocaleString()} points expire soon</span>
                                </div>
                            </div>
                            <div className="relative pt-2">
                                <div className="h-24 bg-slate-100 rounded-2xl overflow-hidden bar-container border-[6px] border-slate-50 shadow-inner">
                                    <PointSegment label="Rollover (Expiring)" amount={balances.rollover} used={impact.used.rollover} colorClass="bg-amber-400" />
                                    <PointSegment label="Current Year" amount={balances.current} used={impact.used.current} colorClass="bg-blue-500" />
                                    <PointSegment label="Bonus / Saved" amount={balances.bonus} used={impact.used.bonus} colorClass="bg-indigo-500" />
                                    <PointSegment label="Borrowed (Next Year)" amount={balances.nextYearAllocation} used={impact.used.borrowed} colorClass="bg-slate-300" />
                                    {impact.gap > 0 && <GapSegment gap={impact.gap} />}
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
                                    {[
                                        { color:'bg-amber-400', label:'Rollover (Expiring)', val:balances.rollover },
                                        { color:'bg-blue-500', label:'Current Year Allocation', val:balances.current },
                                        { color:'bg-indigo-500', label:'Bonus / Saved Points', val:balances.bonus },
                                        { color:'bg-slate-300', label:'Borrowed (Next Year)', val:balances.nextYearAllocation },
                                    ].map(({ color, label, val }) => (
                                        <div key={label} className="flex items-center gap-3 p-3 rounded-2xl bg-slate-50 border border-slate-100">
                                            <div className={`w-4 h-4 rounded-full ${color}`} />
                                            <div className="leading-tight">
                                                <p className="text-[10px] font-black text-slate-400 uppercase">{label}</p>
                                                <p className="text-sm font-black">{val.toLocaleString()}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 mb-8 flex items-center gap-2">
                                        <Icon name="sliders" className="text-blue-600" /> Trip Parameters
                                    </h3>
                                    <div className="space-y-10">
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nights</label>
                                                <span className="text-sm font-black text-blue-600 px-3 py-1 bg-blue-50 rounded-full">{nights} Nights</span>
                                            </div>
                                            <input type="range" min="1" max="14" value={nights} onChange={(e) => { setNights(Number(e.target.value)); setSelectedScenarioId('custom'); }} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Room Size</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                {Object.keys(MULTIPLIERS.roomType).map(t => (
                                                    <button key={t} onClick={() => { setRoomType(t); setSelectedScenarioId('custom'); }} className={`py-3 text-[10px] font-black uppercase rounded-xl border-2 transition-all ${roomType===t ? 'bg-slate-900 border-slate-900 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-500 hover:border-slate-200'}`}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Travel Season</label>
                                            <div className="flex p-1 bg-slate-100 rounded-xl">
                                                {Object.keys(MULTIPLIERS.season).map(s => (
                                                    <button key={s} onClick={() => { setSeason(s); setSelectedScenarioId('custom'); }} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition-all ${season===s ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-8 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {scenarios.map(s => (
                                        <button key={s.id} onClick={() => setSelectedScenarioId(s.id)} className={`group relative p-6 rounded-[1.5rem] border-2 text-left transition-all ${selectedScenarioId===s.id ? 'bg-blue-600 border-blue-600 text-white scale-[1.02] shadow-xl shadow-blue-200' : 'bg-white border-white hover:border-slate-200 text-slate-600 shadow-sm'}`}>
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className={`p-2 rounded-lg ${selectedScenarioId===s.id ? 'bg-white/20' : 'bg-slate-50'}`}><Icon name={s.icon} /></div>
                                                <span className="font-black text-sm">{s.title}</span>
                                            </div>
                                            <p className={`text-[11px] mb-4 ${selectedScenarioId===s.id ? 'text-blue-100' : 'text-slate-400'}`}>{s.desc}</p>
                                            <p className="text-xl font-black">{s.cost.toLocaleString()} <span className="text-[10px] opacity-60">pts</span></p>
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-slate-900 rounded-[2rem] p-8 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-8 opacity-10"><Icon name="info" className="w-32 h-32" /></div>
                                    <div className="relative z-10">
                                        <h3 className="text-lg font-black mb-6 flex items-center gap-2 text-blue-400"><Icon name="zap" /> Scenario Analysis</h3>
                                        <div className="space-y-4">
                                            {impact.used.rollover > 0 && (
                                                <div className="bg-white/5 border border-white/10 p-5 rounded-2xl flex gap-4">
                                                    <Icon name="clock" className="text-amber-400 shrink-0" />
                                                    <div>
                                                        <p className="font-black text-sm text-amber-400 mb-1 tracking-tight">Expiring Points Protected</p>
                                                        <p className="text-xs text-slate-400 leading-relaxed">Excellent planning! This trip uses <span className="text-white font-bold">{impact.used.rollover.toLocaleString()} points</span> that would have vanished on Dec 31st.</p>
                                                    </div>
                                                </div>
                                            )}
                                            {impact.used.borrowed > 0 && (
                                                <div className="bg-white/5 border border-white/10 p-5 rounded-2xl flex gap-4">
                                                    <Icon name="arrow-up-right" className="text-blue-400 shrink-0" />
                                                    <div>
                                                        <p className="font-black text-sm text-blue-400 mb-1 tracking-tight">Future Borrowing Triggered</p>
                                                        <p className="text-xs text-slate-400 leading-relaxed">This stay requires pulling <span className="text-white font-bold">{impact.used.borrowed.toLocaleString()} points</span> from your next year allocation.</p>
                                                    </div>
                                                </div>
                                            )}
                                            {impact.gap > 0 && (
                                                <div className="bg-red-500/10 border border-red-500/20 p-5 rounded-2xl flex gap-4">
                                                    <Icon name="x-circle" className="text-red-400 shrink-0" />
                                                    <div>
                                                        <p className="font-black text-sm text-red-400 mb-1 tracking-tight">Insufficient Balance</p>
                                                        <p className="text-xs text-slate-400 leading-relaxed">You need <span className="text-white font-bold">{impact.gap.toLocaleString()} more points</span> for this specific plan.</p>
                                                    </div>
                                                </div>
                                            )}
                                            <div className="pt-6 mt-6 border-t border-white/10 flex justify-between items-center">
                                                <div>
                                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Points Remaining After Stay</p>
                                                    <p className="text-xl font-black text-emerald-400">{Math.max(0, totalAvailableNow - activeScenario.cost).toLocaleString()}</p>
                                                </div>
                                                <button className="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20">Create Trip</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
