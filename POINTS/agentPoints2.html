<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HGV Collaborative Points Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 4px solid white;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* Custom Scrollbar for inner elements */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // Destination Data (Untouched)
        const DESTINATIONS = [
            { id: '1', title: 'Grand Islander, Waikiki', nights: 7, type: 'Resort', points: 11200, icon: 'palmtree', img: 'https://images.unsplash.com/photo-1542259009477-d625272157b7?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: '2', title: 'Elara, Las Vegas', nights: 4, type: 'Resort', points: 6400, icon: 'dice-5', img: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: '3', title: 'Caribbean Cruise (HSV)', nights: 5, type: 'Experience', points: 15000, icon: 'ship', img: 'https://images.unsplash.com/photo-1599640842225-85d111c60e6b?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: '4', title: 'NYC City Escape', nights: 3, type: 'Urban', points: 4800, icon: 'building', img: 'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: '5', title: 'Orlando Theme Parks', nights: 7, type: 'Resort', points: 8500, icon: 'ticket', img: 'https://images.unsplash.com/photo-1575089776834-8be34696ffb9?auto=format&fit=crop&q=80&w=400&h=250' },
            { id: '6', title: 'Ski Trip in Colorado', nights: 5, type: 'Resort', points: 9200, icon: 'snowflake', img: 'https://images.unsplash.com/photo-1707080193970-b24078d96417?auto=format&fit=crop&q=80&w=400&h=250' }
        ];

        // NEW: Official Points Overview Data
        const POINTS_OVERVIEW = [
            { 
                title: 'ClubPoints', 
                icon: 'wallet',
                color: 'bg-blue-600',
                content: 'The symbolic currency of your vacation ownership. Allocated annually based on location, season, and accommodation. They enable access to Club privileges and expire at the end of each calendar year if unused.'
            },
            { 
                title: 'Saved Points', 
                icon: 'piggy-bank',
                color: 'bg-purple-600',
                content: 'ClubPoints that have been "saved" for an additional year. Use them for Home Resort and Club Reservations, by Hilton Club Priority, RCI exchanges, and Travel Services/ClubPartner Perks.'
            },
            { 
                title: 'Bonus Points', 
                icon: 'sparkles',
                color: 'bg-emerald-500',
                content: 'An extra currency awarded with purchases or affiliations. Valid for up to 2 years. Highly flexible: use for hotel reservations, RCI, gift certificates, maintenance fees, or convert to Honors Points.'
            },
            { 
                title: 'Hilton Honors', 
                icon: 'building-2',
                color: 'bg-slate-800',
                content: 'The currency of the award-winning Hilton Honors program. You can convert Bonus Points (or combine them with ClubPoints) to earn and redeem stays throughout the global Hilton Worldwide Portfolio.'
            }
        ];

        // NEW: Ways to Use Points Matrix Data
        const USE_MATRIX = [
            { reservation: 'Home Week', current: true, borrowed: false, saved: false, bonus: false, honors: false },
            { reservation: 'Home Resort', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'Club', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'HGV Max', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'Priority (by Hilton Club)', current: true, borrowed: true, saved: true, bonus: false, honors: false },
            { reservation: 'Travel Services & Perks', current: true, borrowed: true, saved: true, bonus: true, honors: false },
            { reservation: 'RCI Exchange', current: true, borrowed: true, saved: true, bonus: true, honors: false },
        ];

        // NEW: User's Actual Allotment Data
        const ALLOTMENTS = [
            { type: 'Bonus Points', points: '50,000', received: '01/01/2025', expires: '12/31/2027' },
            { type: 'ClubPoints - 2026', points: '100,000', received: '01/01/2026', expires: '12/31/2026' },
            { type: 'Saved ClubPoints - 2026', points: '88,958', received: '01/01/2026', expires: '12/31/2026' },
            { type: 'ClubPoints - 2027', points: '100,000', received: '01/01/2027', expires: '12/31/2027' },
            { type: 'Saved ClubPoints - 2027', points: '0', received: '01/01/2027', expires: '12/31/2027' },
            { type: 'ClubPoints - 2028', points: '100,000', received: '01/01/2028', expires: '12/31/2028' },
            { type: 'Saved ClubPoints - 2028', points: '0', received: '01/01/2028', expires: '12/31/2028' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('planner'); 
            const [annualPoints, setAnnualPoints] = useState(15000);
            const [cart, setCart] = useState([]);

            const pointsUsed = cart.reduce((sum, trip) => sum + trip.points, 0);
            const pointsRemaining = annualPoints - pointsUsed;

            const toggleTrip = (trip) => {
                if (cart.find(t => t.id === trip.id)) {
                    setCart(cart.filter(t => t.id !== trip.id));
                } else {
                    if (pointsRemaining >= trip.points) {
                        setCart([...cart, trip]);
                    }
                }
            };

            const getTier = (pts) => {
                if (pts >= 24000) return 'Premier';
                if (pts >= 14000) return 'Preferred';
                return 'Member';
            };

            // Helper for the matrix checkmarks
            const renderCell = (value) => {
                return value ? 
                    <Icon name="check-circle-2" className="w-5 h-5 text-emerald-500 mx-auto" /> : 
                    <Icon name="minus" className="w-5 h-5 text-slate-300 mx-auto" />;
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-slate-50 text-slate-800">
                    
                    {/* Header - Shared View */}
                    <header className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm z-10 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                <Icon name="compass" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black tracking-tight">HGV Lifestyle Planner</h1>
                                <p className="text-sm text-slate-500 font-medium">Explore what ownership unlocks for your family</p>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                            <button 
                                onClick={() => setActiveTab('planner')}
                                className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'planner' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <div className="flex items-center gap-2"><Icon name="calculator" className="w-4 h-4" /> Trip Builder</div>
                            </button>
                            <button 
                                onClick={() => setActiveTab('education')}
                                className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'education' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <div className="flex items-center gap-2"><Icon name="book-open" className="w-4 h-4" /> How Points Work</div>
                            </button>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-hidden flex relative">
                        
                        {/* TAB 1: TRIP BUILDER (Untouched logic & layout) */}
                        {activeTab === 'planner' && (
                            <div className="flex w-full h-full fade-in">
                                
                                {/* Left Side: The Interactive Slider & Math */}
                                <div className="w-1/3 bg-white border-r border-slate-200 p-8 flex flex-col shadow-lg z-10">
                                    <div className="mb-8">
                                        <h2 className="text-sm font-black text-slate-400 tracking-widest uppercase mb-1">Your Annual Portfolio</h2>
                                        <p className="text-slate-500 text-sm mb-6">Let's find the right point level for your travel habits.</p>
                                        
                                        <div className="text-center mb-6">
                                            <span className="text-5xl font-black text-blue-600 tracking-tighter">{annualPoints.toLocaleString()}</span>
                                            <span className="text-lg text-slate-500 font-bold ml-2">Pts / Year</span>
                                        </div>

                                        <input 
                                            type="range" 
                                            min="5000" 
                                            max="30000" 
                                            step="1000"
                                            value={annualPoints}
                                            onChange={(e) => {
                                                setAnnualPoints(Number(e.target.value));
                                                // Clear cart if new limit is lower than used
                                                if (Number(e.target.value) < pointsUsed) setCart([]);
                                            }}
                                            className="w-full mb-2"
                                        />
                                        <div className="flex justify-between text-xs font-bold text-slate-400">
                                            <span>5K</span>
                                            <span>HGV Max Tier: <span className="text-blue-500">{getTier(annualPoints)}</span></span>
                                            <span>30K</span>
                                        </div>
                                    </div>

                                    <div className="border-t border-slate-200 pt-8 flex-1 flex flex-col min-h-0">
                                        <div className="flex justify-between items-end mb-4 shrink-0">
                                            <h3 className="font-bold text-lg">Sample Year Plan</h3>
                                            <button onClick={() => setCart([])} className="text-xs text-slate-400 hover:text-red-500 font-bold flex items-center gap-1">
                                                <Icon name="rotate-ccw" className="w-3 h-3" /> Reset
                                            </button>
                                        </div>
                                        
                                        {/* Cart Items */}
                                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-3 mb-4">
                                            {cart.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center">
                                                    <Icon name="plane-takeoff" className="w-10 h-10 mb-2 opacity-50" />
                                                    <p className="text-sm font-medium">Click destinations on the right to build your dream year.</p>
                                                </div>
                                            ) : (
                                                cart.map(trip => (
                                                    <div key={trip.id} className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex justify-between items-center group">
                                                        <div>
                                                            <p className="text-sm font-bold text-slate-800">{trip.title}</p>
                                                            <p className="text-xs text-slate-500">{trip.nights} Nights</p>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-sm font-bold text-blue-600">-{trip.points.toLocaleString()}</span>
                                                            <button onClick={() => toggleTrip(trip)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <Icon name="x-circle" className="w-5 h-5" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        {/* Point Math Box */}
                                        <div className="bg-slate-900 text-white p-5 rounded-2xl shadow-xl mt-auto shrink-0">
                                            <div className="flex justify-between text-sm mb-2 text-slate-400">
                                                <span>Starting Points</span>
                                                <span>{annualPoints.toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between text-sm mb-4 text-slate-400 border-b border-slate-700 pb-4">
                                                <span>Points Planned</span>
                                                <span className="text-red-400">-{pointsUsed.toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="font-bold text-slate-300">Remaining</span>
                                                <span className={`text-2xl font-black ${pointsRemaining < 2000 ? 'text-amber-400' : 'text-emerald-400'}`}>
                                                    {pointsRemaining.toLocaleString()}
                                                </span>
                                            </div>
                                            {pointsRemaining > 0 && pointsRemaining < 4000 && (
                                                <div className="mt-3 text-xs text-amber-300 bg-amber-500/10 p-2 rounded-lg flex items-start gap-2">
                                                    <Icon name="lightbulb" className="w-4 h-4 shrink-0" />
                                                    <span>Leftover points? You can bank them for next year, or convert to Hilton Honors!</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Right Side: Destinations Grid */}
                                <div className="w-2/3 p-8 overflow-y-auto custom-scrollbar">
                                    <div className="flex justify-between items-end mb-6">
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800 tracking-tight">What this unlocks for you</h2>
                                            <p className="text-slate-500 mt-1">Select experiences to add to your Sample Year Plan.</p>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-8">
                                        {DESTINATIONS.map(dest => {
                                            const inCart = cart.find(t => t.id === dest.id);
                                            const canAfford = pointsRemaining >= dest.points || inCart;
                                            
                                            return (
                                                <div 
                                                    key={dest.id}
                                                    onClick={() => { if(canAfford) toggleTrip(dest); }}
                                                    className={`relative rounded-2xl overflow-hidden border-2 transition-all duration-300 ${inCart ? 'border-blue-500 shadow-xl shadow-blue-500/20 scale-[1.02]' : canAfford ? 'border-transparent shadow-md hover:shadow-xl cursor-pointer hover:-translate-y-1 bg-white' : 'border-transparent bg-slate-100 opacity-60 grayscale cursor-not-allowed'}`}
                                                >
                                                    {inCart && (
                                                        <div className="absolute top-3 right-3 z-10 bg-blue-500 text-white rounded-full p-1 shadow-lg">
                                                            <Icon name="check" className="w-4 h-4" />
                                                        </div>
                                                    )}
                                                    
                                                    <div className="h-40 w-full relative">
                                                        <div className="absolute inset-0 bg-slate-900/20 z-0"></div>
                                                        <img src={dest.img} alt={dest.title} className="w-full h-full object-cover" />
                                                        <div className="absolute top-3 left-3 z-10 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-md text-xs font-bold text-slate-700 flex items-center gap-1 shadow-sm">
                                                            <Icon name={dest.icon} className="w-3 h-3" /> {dest.type}
                                                        </div>
                                                    </div>
                                                    <div className="p-4 bg-white">
                                                        <h4 className="font-bold text-slate-800 line-clamp-1">{dest.title}</h4>
                                                        <p className="text-sm text-slate-500 mb-3">{dest.nights} Nights</p>
                                                        <div className="flex justify-between items-center pt-3 border-t border-slate-100">
                                                            <span className="text-sm font-black text-blue-600">{dest.points.toLocaleString()} pts</span>
                                                            {!canAfford && !inCart && (
                                                                <span className="text-[10px] font-bold text-red-400 uppercase tracking-wider bg-red-50 px-2 py-1 rounded">Needs More</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: EDUCATION HUB (Completely Updated) */}
                        {activeTab === 'education' && (
                            <div className="flex-1 overflow-y-auto custom-scrollbar fade-in bg-slate-100">
                                
                                <div className="max-w-6xl mx-auto px-8 py-12 space-y-12">
                                    
                                    {/* Intro Section */}
                                    <div className="text-center max-w-2xl mx-auto">
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">How Points Work</h2>
                                        <p className="text-slate-600 mt-3 text-lg">Hilton Grand Vacations Club is a flexible, point-based reservation system. Understanding your point types unlocks the full value of your ownership.</p>
                                    </div>

                                    {/* 1. Point Types Grid */}
                                    <div>
                                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                            <Icon name="layers" className="text-blue-600" /> Points Overview
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {POINTS_OVERVIEW.map((card, idx) => (
                                                <div key={idx} className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow flex flex-col h-full">
                                                    <div className={`w-12 h-12 rounded-xl ${card.color} text-white flex items-center justify-center mb-4 shadow-sm`}>
                                                        <Icon name={card.icon} className="w-6 h-6" />
                                                    </div>
                                                    <h4 className="text-lg font-bold text-slate-800 mb-2">{card.title}</h4>
                                                    <p className="text-slate-600 text-sm leading-relaxed flex-1">
                                                        {card.content}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 2. Ways to Use Points Matrix */}
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="p-6 border-b border-slate-200 bg-slate-50">
                                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                                <Icon name="map-pin" className="text-blue-600" /> Ways to Use Points
                                            </h3>
                                            <p className="text-sm text-slate-500 mt-1">See exactly where your different currencies can take you.</p>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead className="bg-white">
                                                    <tr>
                                                        <th className="p-4 font-bold text-slate-800 border-b border-r border-slate-200">Reservation Type</th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center">Current Year<br/><span className="text-xs font-normal text-slate-400">ClubPoints</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center">Borrowed<br/><span className="text-xs font-normal text-slate-400">From Next Year</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center bg-purple-50">Saved<br/><span className="text-xs font-normal text-slate-400">Points</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center bg-emerald-50">Bonus<br/><span className="text-xs font-normal text-slate-400">Points</span></th>
                                                        <th className="p-4 font-semibold text-slate-600 border-b text-center bg-slate-100">Hilton Honors<br/><span className="text-xs font-normal text-slate-400">Points</span></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {USE_MATRIX.map((row, idx) => (
                                                        <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 font-medium text-slate-700 border-r border-slate-200">{row.reservation}</td>
                                                            <td className="p-4 text-center">{renderCell(row.current)}</td>
                                                            <td className="p-4 text-center">{renderCell(row.borrowed)}</td>
                                                            <td className="p-4 text-center bg-purple-50/50">{renderCell(row.saved)}</td>
                                                            <td className="p-4 text-center bg-emerald-50/50">{renderCell(row.bonus)}</td>
                                                            <td className="p-4 text-center bg-slate-50">{renderCell(row.honors)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* 3. My Current Points Dashboard (Based on user document) */}
                                    <div className="mb-12">
                                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                            <Icon name="pie-chart" className="text-blue-600" /> Manage My Points
                                        </h3>
                                        
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            {/* Summary Card */}
                                            <div className="lg:col-span-1 bg-blue-600 rounded-2xl p-8 text-white shadow-lg relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-white rounded-full mix-blend-overlay opacity-10 transform translate-x-8 -translate-y-8"></div>
                                                <h4 className="text-blue-100 font-semibold mb-1 uppercase tracking-wider text-sm">2026 Club Currency</h4>
                                                <div className="text-5xl font-black mb-6">188,958</div>
                                                
                                                <div className="space-y-3">
                                                    <div className="flex justify-between items-center text-sm border-b border-blue-500/50 pb-2">
                                                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-400"></div> Bonus Points</span>
                                                        <span className="font-bold">50,000</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-sm border-b border-blue-500/50 pb-2">
                                                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-300"></div> Points - 2026</span>
                                                        <span className="font-bold">100,000</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-purple-400"></div> Saved Points - 2026</span>
                                                        <span className="font-bold">88,958</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Detailed Allotment List */}
                                            <div className="lg:col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                                    <h4 className="font-bold text-slate-800">Annual Allotment Timeline</h4>
                                                    <span className="text-xs font-bold bg-blue-50 text-blue-600 px-3 py-1 rounded-full border border-blue-100">Real-Time Data</span>
                                                </div>
                                                <div className="flex-1 overflow-x-auto p-0">
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider">
                                                            <tr>
                                                                <th className="p-4 font-semibold">Type</th>
                                                                <th className="p-4 font-semibold text-right">Points</th>
                                                                <th className="p-4 font-semibold">Date Received</th>
                                                                <th className="p-4 font-semibold">Date Expiring</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {ALLOTMENTS.map((item, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50">
                                                                    <td className="p-4 font-medium text-slate-700">{item.type}</td>
                                                                    <td className="p-4 font-bold text-slate-800 text-right">{item.points}</td>
                                                                    <td className="p-4 text-slate-500">{item.received}</td>
                                                                    <td className="p-4 text-slate-500 flex items-center gap-2">
                                                                        {item.expires}
                                                                        {item.points !== '0' && <Icon name="clock" className="w-3 h-3 text-slate-300" />}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
